name: Build or release WuWa Companion
run-name: "Universal ${{ inputs.release_action }}"

on:
  workflow_dispatch:
    inputs:
      release_action:
        description: "Read RELEASE_STATUS.md first, then build only, prerelease, or publish"
        required: true
        type: choice
        options:
          - build-only
          - prerelease
          - publish
        default: build-only
      max_items_per_dataset:
        description: "Maximum records to collect for each database dataset"
        required: true
        default: "250"

permissions:
  contents: write

concurrency:
  group: universal-release-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out Android repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out database repository
        uses: actions/checkout@v4
        with:
          repository: Innocent254/wuwa-database-server
          path: database-source
          fetch-depth: 1
          token: ${{ secrets.WUWA_RELEASE_TOKEN != '' && secrets.WUWA_RELEASE_TOKEN || github.token }}

      - name: Plan synchronized release
        id: plan
        shell: bash
        run: |
          python scripts/universal_release_train.py plan \
            --app . \
            --database database-source \
            --action "${{ inputs.release_action }}" \
            --output "$RUNNER_TEMP/universal-plan.json" \
            --markdown "$RUNNER_TEMP/universal-plan.md"

          cat "$RUNNER_TEMP/universal-plan.md" >> "$GITHUB_STEP_SUMMARY"

          for key in \
            target_version target_version_code target_channel current_channel \
            app_content_hash database_content_hash source_changed promote_only no_op \
            build_data build_app data_release_needed app_release_needed; do
            echo "$key=$(jq -r ".$key" "$RUNNER_TEMP/universal-plan.json")" >> "$GITHUB_OUTPUT"
          done

      - name: Explain no-op result
        if: steps.plan.outputs.no_op == 'true'
        run: |
          echo "No tracked source changes require a new version or release." >> "$GITHUB_STEP_SUMMARY"
          echo "Nothing was published." >> "$GITHUB_STEP_SUMMARY"

      - name: Require cross-repository release token
        if: >-
          steps.plan.outputs.no_op != 'true' &&
          inputs.release_action != 'build-only'
        shell: bash
        run: |
          test -n "${{ secrets.WUWA_RELEASE_TOKEN }}" || {
            echo "WUWA_RELEASE_TOKEN is required because this workflow publishes to both repositories."
            exit 1
          }

      - name: Set up Python
        if: steps.plan.outputs.build_data == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: database-source/pyproject.toml

      - name: Install database builder and tests
        if: steps.plan.outputs.build_data == 'true'
        working-directory: database-source
        run: pip install -e ".[dev]"

      - name: Test database builder
        if: steps.plan.outputs.build_data == 'true'
        working-directory: database-source
        run: python -m pytest -q

      - name: Build text database and optional image package
        if: steps.plan.outputs.build_data == 'true'
        working-directory: database-source
        run: |
          python -m wuwa_builder.cli \
            --output build/release \
            --version "${{ steps.plan.outputs.target_version }}" \
            --max-items-per-dataset "${{ inputs.max_items_per_dataset }}" \
            --include-images

      - name: Restore persistent test keystore
        if: >-
          steps.plan.outputs.build_app == 'true' &&
          inputs.release_action == 'build-only'
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_TEST_KEYSTORE_BASE64 }}" || {
            echo "ANDROID_TEST_KEYSTORE_BASE64 is not configured."
            exit 1
          }
          test -n "${{ secrets.TEST_KEYSTORE_PASSWORD }}" || exit 1
          test -n "${{ secrets.TEST_KEY_ALIAS }}" || exit 1
          test -n "${{ secrets.TEST_KEY_PASSWORD }}" || exit 1
          printf '%s' "${{ secrets.ANDROID_TEST_KEYSTORE_BASE64 }}" \
            | base64 --decode > "$RUNNER_TEMP/test-debug.jks"
          echo "ANDROID_TEST_KEYSTORE_PATH=$RUNNER_TEMP/test-debug.jks" >> "$GITHUB_ENV"
          echo "TEST_KEYSTORE_PASSWORD=${{ secrets.TEST_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "TEST_KEY_ALIAS=${{ secrets.TEST_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "TEST_KEY_PASSWORD=${{ secrets.TEST_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Restore release keystore
        if: >-
          steps.plan.outputs.build_app == 'true' &&
          inputs.release_action != 'build-only'
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || {
            echo "ANDROID_KEYSTORE_BASE64 is not configured."
            exit 1
          }
          test -n "${{ secrets.KEYSTORE_PASSWORD }}" || {
            echo "KEYSTORE_PASSWORD is not configured."
            exit 1
          }
          test -n "${{ secrets.KEY_ALIAS }}" || {
            echo "KEY_ALIAS is not configured."
            exit 1
          }
          test -n "${{ secrets.KEY_PASSWORD }}" || {
            echo "KEY_PASSWORD is not configured."
            exit 1
          }
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Set up Java
        if: steps.plan.outputs.build_app == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        if: steps.plan.outputs.build_app == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build universal Android APK
        if: steps.plan.outputs.build_app == 'true'
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.plan.outputs.target_version }}
          ORG_GRADLE_PROJECT_VERSION_CODE: ${{ steps.plan.outputs.target_version_code }}
          ORG_GRADLE_PROJECT_RELEASE_CHANNEL: ${{ steps.plan.outputs.target_channel }}
        shell: bash
        run: |
          if [ "${{ inputs.release_action }}" = "build-only" ]; then
            gradle :app:assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk \
              "WuWaCompanion-${{ steps.plan.outputs.target_version }}-debug.apk"
          else
            gradle :app:assembleRelease
            cp app/build/outputs/apk/release/app-release.apk \
              "WuWaCompanion-${{ steps.plan.outputs.target_version }}.apk"
          fi

      - name: Upload paired build artifacts
        if: >-
          steps.plan.outputs.no_op != 'true' &&
          (steps.plan.outputs.build_app == 'true' || steps.plan.outputs.build_data == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: universal-pair-${{ steps.plan.outputs.target_version }}
          path: |
            WuWaCompanion-*.apk
            database-source/build/release/version.json
            database-source/build/release/catalog.json
            database-source/build/release/database-full.wupack
            database-source/build/release/assets-full.wupack
            database-source/build/release/CHANGELOG.md
            database-source/build/release/ATTRIBUTION.md
            database-source/build/release/DATA_LICENSE.md
          if-no-files-found: warn
          retention-days: 21

      - name: Publish database release and channel manifest
        if: steps.plan.outputs.data_release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.WUWA_RELEASE_TOKEN }}
          VERSION: ${{ steps.plan.outputs.target_version }}
          CHANNEL: ${{ steps.plan.outputs.target_channel }}
        working-directory: database-source
        shell: bash
        run: |
          TAG="data-v$VERSION"
          TITLE="WuWa data $VERSION"

          if gh -R Innocent254/wuwa-database-server release view "$TAG" >/dev/null 2>&1; then
            gh -R Innocent254/wuwa-database-server release upload "$TAG" \
              build/release/database-full.wupack \
              build/release/assets-full.wupack \
              build/release/version.json \
              build/release/catalog.json \
              build/release/ATTRIBUTION.md \
              build/release/DATA_LICENSE.md \
              --clobber
          else
            EXTRA=()
            if [ "$CHANNEL" = "prerelease" ]; then EXTRA+=(--prerelease); fi
            gh -R Innocent254/wuwa-database-server release create "$TAG" \
              build/release/database-full.wupack \
              build/release/assets-full.wupack \
              build/release/version.json \
              build/release/catalog.json \
              build/release/ATTRIBUTION.md \
              build/release/DATA_LICENSE.md \
              --title "$TITLE" \
              --notes-file build/release/CHANGELOG.md \
              "${EXTRA[@]}"
          fi

          RELEASE_ID=$(gh api "repos/Innocent254/wuwa-database-server/releases/tags/$TAG" --jq .id)
          if [ "$CHANNEL" = "prerelease" ]; then
            gh api -X PATCH "repos/Innocent254/wuwa-database-server/releases/$RELEASE_ID" \
              -F prerelease=true -F draft=false >/dev/null
            DEST="public/prerelease"
          else
            gh api -X PATCH "repos/Innocent254/wuwa-database-server/releases/$RELEASE_ID" \
              -F prerelease=false -F draft=false >/dev/null
            DEST="public/latest"
          fi

          mkdir -p "$DEST"
          cp build/release/version.json "$DEST/version.json"
          cp build/release/catalog.json "$DEST/catalog.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          if ! git diff --cached --quiet; then
            git commit -m "Publish data $VERSION ($CHANNEL)"
            git push
          fi

      - name: Promote database prerelease to stable
        if: steps.plan.outputs.promote_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.WUWA_RELEASE_TOKEN }}
          VERSION: ${{ steps.plan.outputs.target_version }}
        working-directory: database-source
        shell: bash
        run: |
          TAG="data-v$VERSION"
          RELEASE_ID=$(gh api "repos/Innocent254/wuwa-database-server/releases/tags/$TAG" --jq .id)
          gh api -X PATCH "repos/Innocent254/wuwa-database-server/releases/$RELEASE_ID" \
            -F prerelease=false -F draft=false >/dev/null

          test -f public/prerelease/version.json
          mkdir -p public/latest
          cp public/prerelease/version.json public/latest/version.json
          cp public/prerelease/catalog.json public/latest/catalog.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest
          if ! git diff --cached --quiet; then
            git commit -m "Promote data $VERSION to stable"
            git push
          fi

      - name: Publish Android release and channel manifest
        if: steps.plan.outputs.app_release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.plan.outputs.target_version }}
          VERSION_CODE: ${{ steps.plan.outputs.target_version_code }}
          CHANNEL: ${{ steps.plan.outputs.target_channel }}
          APP_HASH: ${{ steps.plan.outputs.app_content_hash }}
          DATABASE_HASH: ${{ steps.plan.outputs.database_content_hash }}
        shell: bash
        run: |
          APK="WuWaCompanion-$VERSION.apk"
          TAG="app-v$VERSION"
          TITLE="WuWa Companion $VERSION"
          SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$APK"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            EXTRA=()
            if [ "$CHANNEL" = "prerelease" ]; then EXTRA+=(--prerelease); fi
            gh release create "$TAG" "$APK" \
              --title "$TITLE" \
              --generate-notes \
              "${EXTRA[@]}"
          fi

          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq .id)
          if [ "$CHANNEL" = "prerelease" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" \
              -F prerelease=true -F draft=false >/dev/null
            MANIFEST="updates/app-update-prerelease.json"
          else
            gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" \
              -F prerelease=false -F draft=false >/dev/null
            MANIFEST="updates/app-update.json"
          fi

          cat > "$MANIFEST" <<JSON
          {
            "version_code": $VERSION_CODE,
            "version_name": "$VERSION",
            "minimum_android_sdk": 26,
            "supports_images": true,
            "apk_url": "$URL",
            "apk_sha256": "$SHA",
            "release_notes_url": "https://github.com/${{ github.repository }}/releases/tag/$TAG",
            "available": true
          }
          JSON

          python scripts/universal_release_train.py update-state \
            --state .release/universal-state.json \
            --version "$VERSION" \
            --version-code "$VERSION_CODE" \
            --channel "$CHANNEL" \
            --app-hash "$APP_HASH" \
            --database-hash "$DATABASE_HASH"

          python scripts/universal_release_train.py status \
            --app . \
            --database database-source \
            --output RELEASE_STATUS.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST" .release/universal-state.json RELEASE_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m "Record universal $CHANNEL $VERSION"
            git push
          fi
