name: Build Android app manually

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, for example 0.1.0"
        required: true
        default: "0.1.0"
      version_code:
        description: "Monotonically increasing Android version code"
        required: true
        default: "1"
      mode:
        description: "Build only, or publish a signed GitHub Release"
        required: true
        type: choice
        options:
          - build-only
          - publish
        default: build-only

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore release keystore
        if: inputs.mode == 'publish'
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || {
            echo "ANDROID_KEYSTORE_BASE64 is not configured."
            exit 1
          }
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APK
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ inputs.version_name }}
          ORG_GRADLE_PROJECT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          if [ "${{ inputs.mode }}" = "publish" ]; then
            gradle :app:assembleRelease
            cp app/build/outputs/apk/release/app-release.apk WuWaCompanion-${{ inputs.version_name }}.apk
          else
            gradle :app:assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk WuWaCompanion-${{ inputs.version_name }}-debug.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WuWaCompanion-${{ inputs.version_name }}
          path: WuWaCompanion-*.apk
          retention-days: 14

      - name: Publish GitHub Release and app manifest
        if: inputs.mode == 'publish'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          APK="WuWaCompanion-${{ inputs.version_name }}.apk"
          SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          TAG="app-v${{ inputs.version_name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$APK"

          cat > updates/app-update.json <<JSON
          {
            "version_code": ${{ inputs.version_code }},
            "version_name": "${{ inputs.version_name }}",
            "minimum_android_sdk": 26,
            "apk_url": "$URL",
            "apk_sha256": "$SHA",
            "release_notes_url": "https://github.com/${{ github.repository }}/releases/tag/$TAG",
            "available": true
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/app-update.json
          git commit -m "Publish app ${{ inputs.version_name }}"
          git push

          gh release create "$TAG" "$APK" \
            --title "WuWa Companion ${{ inputs.version_name }}" \
            --generate-notes
